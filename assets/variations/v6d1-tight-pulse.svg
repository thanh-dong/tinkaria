<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V6d1: Tight Pulse — closely spaced concentric rings, fading opacity outward -->
  <rect width="256" height="256" rx="64" fill="#FFF8EE"/>
  <g transform="translate(128 128)" stroke-linecap="round" stroke-linejoin="round">
    <!-- tight concentric pulse rings -->
    <circle r="14" stroke="#D14A3D" stroke-width="1.8" fill="none" opacity="0.5"/>
    <circle r="19" stroke="#D14A3D" stroke-width="1.4" fill="none" opacity="0.35"/>
    <circle r="24" stroke="#D14A3D" stroke-width="1.0" fill="none" opacity="0.22"/>
    <circle r="29" stroke="#D14A3D" stroke-width="0.7" fill="none" opacity="0.12"/>
    <!-- main dark ring -->
    <circle r="34" stroke="#17322C" stroke-width="3.5" fill="none"/>
    <!-- bold red cardinals -->
    <g stroke="#D14A3D" stroke-width="9">
      <path d="M0 -76V-50"/><path d="M0 50V76"/>
      <path d="M-76 0H-50"/><path d="M50 0H76"/>
    </g>
    <!-- dashed dark diagonals -->
    <g stroke="#17322C" stroke-width="2.5" stroke-dasharray="7 5">
      <path d="M-53 -53L-38 -38"/><path d="M38 38L53 53"/>
      <path d="M53 -53L38 -38"/><path d="M-38 38L-53 53"/>
    </g>
  </g>
  <circle cx="128" cy="128" r="7" fill="#D14A3D"/>
</svg>
