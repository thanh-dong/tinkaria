<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V6d: Pulsing core — multiple fading concentric circles, dashed diags, bold cardinals -->
  <rect width="256" height="256" rx="64" fill="#FFF8EE"/>
  <g transform="translate(128 128)" stroke-linecap="round" stroke-linejoin="round">
    <!-- concentric depth rings (inside out) -->
    <circle r="15" stroke="#D14A3D" stroke-width="1" fill="none" opacity="0.15"/>
    <circle r="21" stroke="#D14A3D" stroke-width="1.2" fill="none" opacity="0.25"/>
    <circle r="27" stroke="#D14A3D" stroke-width="1.5" fill="none" opacity="0.35"/>
    <!-- main dark ring -->
    <circle r="33" stroke="#17322C" stroke-width="3.5" fill="none"/>
    <!-- bold red cardinals -->
    <g stroke="#D14A3D" stroke-width="9">
      <path d="M0 -74V-50"/><path d="M0 50V74"/>
      <path d="M-74 0H-50"/><path d="M50 0H74"/>
    </g>
    <!-- dashed dark diagonals, longer dashes -->
    <g stroke="#17322C" stroke-width="2.5" stroke-dasharray="8 5">
      <path d="M-52 -52L-36 -36"/><path d="M36 36L52 52"/>
      <path d="M52 -52L36 -36"/><path d="M-36 36L-52 52"/>
    </g>
  </g>
  <circle cx="128" cy="128" r="8" fill="#D14A3D"/>
</svg>
