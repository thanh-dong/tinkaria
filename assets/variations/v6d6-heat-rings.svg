<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V6d6: Heat Rings — concentric rings that shift color from hot center to cool outer -->
  <rect width="256" height="256" rx="64" fill="#FFF8EE"/>
  <g transform="translate(128 128)" stroke-linecap="round" stroke-linejoin="round">
    <!-- heat gradient rings: red → dark transitioning outward -->
    <circle r="14" stroke="#E05A3A" stroke-width="2" fill="none" opacity="0.55"/>
    <circle r="20" stroke="#D14A3D" stroke-width="1.8" fill="none" opacity="0.4"/>
    <circle r="26" stroke="#A83829" stroke-width="1.5" fill="none" opacity="0.28"/>
    <!-- main ring in dark -->
    <circle r="33" stroke="#17322C" stroke-width="4" fill="none"/>
    <!-- bold red cardinals -->
    <g stroke="#D14A3D" stroke-width="9">
      <path d="M0 -76V-50"/><path d="M0 50V76"/>
      <path d="M-76 0H-50"/><path d="M50 0H76"/>
    </g>
    <!-- dashed dark diagonals -->
    <g stroke="#17322C" stroke-width="2.5" stroke-dasharray="6 5">
      <path d="M-53 -53L-38 -38"/><path d="M38 38L53 53"/>
      <path d="M53 -53L38 -38"/><path d="M-38 38L-53 53"/>
    </g>
  </g>
  <circle cx="128" cy="128" r="7" fill="#E05A3A"/>
</svg>
