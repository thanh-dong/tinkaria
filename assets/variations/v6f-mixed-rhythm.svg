<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- V6f: Mixed rhythm — dash cardinals near ring, solid at tips, solid ring, subtle inner cross -->
  <rect width="256" height="256" rx="64" fill="#FFF8EE"/>
  <g transform="translate(128 128)" stroke-linecap="round" stroke-linejoin="round">
    <!-- solid red cardinal tips (outer) -->
    <g stroke="#D14A3D" stroke-width="9">
      <path d="M0 -74V-58"/><path d="M0 58V74"/>
      <path d="M-74 0H-58"/><path d="M58 0H74"/>
    </g>
    <!-- dashed red cardinal inner segments -->
    <g stroke="#D14A3D" stroke-width="5" stroke-dasharray="4 4">
      <path d="M0 -54V-44"/><path d="M0 44V54"/>
      <path d="M-54 0H-44"/><path d="M44 0H54"/>
    </g>
    <!-- fine solid dark diagonals -->
    <g stroke="#17322C" stroke-width="2.5">
      <path d="M-52 -52L-36 -36"/><path d="M36 36L52 52"/>
      <path d="M52 -52L36 -36"/><path d="M-36 36L-52 52"/>
    </g>
    <!-- solid dark ring -->
    <circle r="32" stroke="#17322C" stroke-width="3.5" fill="none"/>
    <!-- subtle inner cross for depth -->
    <g stroke="#D14A3D" stroke-width="1" opacity="0.2">
      <path d="M0 -18V18"/><path d="M-18 0H18"/>
    </g>
  </g>
  <circle cx="128" cy="128" r="10" fill="#D14A3D"/>
</svg>
